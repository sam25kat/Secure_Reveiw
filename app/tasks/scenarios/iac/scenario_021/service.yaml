apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: prod
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
    - 0.0.0.0/0
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: payments-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: api
          image: company/payments:1.4.2
          ports:
            - containerPort: 8080
          env:
            - name: TLS_DISABLED
              value: "true"
