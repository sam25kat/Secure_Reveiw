version: "3.8"

services:
  api:
    image: company/api:latest
    privileged: true
    network_mode: host
    environment:
      - DATABASE_PASSWORD=ProdPg!2023Pass
      - JWT_SECRET=hardcoded-jwt-secret-do-not-use
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host
    user: root

  db:
    image: postgres:9.6
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  redis:
    image: redis
    ports:
      - "6379:6379"
